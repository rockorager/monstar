<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="440" viewBox="0 0 1200 440" role="img"><title>Terminal keystroke latency distribution</title>
<desc>Box plots comparing key-event-to-echoed-frame-commit latency for Monstar, foot, Ghostty, kitty, and Alacritty.</desc>
<style>
    .title { fill: #f0f6fc; font: 700 28px -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
    .subtitle { fill: #a8b3bf; font: 15px -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
    .label { fill: #f0f6fc; font: 15px -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
    .small { fill: #a8b3bf; font: 13px -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
    .axis { fill: #a8b3bf; font: 12px -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
    .grid { stroke: #3d444d; stroke-width: 1; }
    .whisker { stroke: #a8b3bf; stroke-width: 1.4; }
    .median { stroke: #f0f6fc; stroke-width: 2.2; }
    .line { stroke: #3d444d; stroke-width: 1; }
    </style>
<rect width="1200" height="440" rx="18" fill="#0d1117"/>
<rect x="1" y="1" width="1198" height="438" rx="17" fill="none" stroke="#3d444d"/>
<rect x="28" y="84" width="1144" height="320" rx="12" fill="#161b22"/>
<text x="42" y="48" class="title" text-anchor="start">Keystroke latency distribution</text>
<text x="42" y="72" class="subtitle" text-anchor="start">200 injected keys · key event to echoed-frame commit · logarithmic scale · lower is better</text>
<line x1="260" y1="100" x2="260" y2="365" class="grid"/>
<text x="260" y="391" class="axis" text-anchor="middle">0.1 ms</text>
<line x1="382.34" y1="100" x2="382.34" y2="365" class="grid"/>
<text x="382.34" y="391" class="axis" text-anchor="middle">0.2 ms</text>
<line x1="544.07" y1="100" x2="544.07" y2="365" class="grid"/>
<text x="544.07" y="391" class="axis" text-anchor="middle">0.5 ms</text>
<line x1="666.41" y1="100" x2="666.41" y2="365" class="grid"/>
<text x="666.41" y="391" class="axis" text-anchor="middle">1 ms</text>
<line x1="788.75" y1="100" x2="788.75" y2="365" class="grid"/>
<text x="788.75" y="391" class="axis" text-anchor="middle">2 ms</text>
<line x1="950.48" y1="100" x2="950.48" y2="365" class="grid"/>
<text x="950.48" y="391" class="axis" text-anchor="middle">5 ms</text>
<line x1="1072.82" y1="100" x2="1072.82" y2="365" class="grid"/>
<text x="1072.82" y="391" class="axis" text-anchor="middle">10 ms</text>
<text x="52" y="130" class="label" text-anchor="start">Monstar</text>
<text x="242" y="130" class="small" text-anchor="end">0.26 ms</text>
<line x1="380.43" y1="125" x2="516.52" y2="125" class="whisker"/>
<line x1="380.43" y1="118" x2="380.43" y2="132" class="whisker"/>
<line x1="516.52" y1="118" x2="516.52" y2="132" class="whisker"/>
<rect x="400.87" y="114" width="57.34" height="22" rx="4" fill="#d783ed" fill-opacity="0.3" stroke="#d783ed" stroke-width="2"/>
<line x1="425.74" y1="114" x2="425.74" y2="136" class="median"/>
<text x="52" y="182" class="label" text-anchor="start">foot</text>
<text x="242" y="182" class="small" text-anchor="end">0.74 ms</text>
<line x1="594.15" y1="177" x2="639.29" y2="177" class="whisker"/>
<line x1="594.15" y1="170" x2="594.15" y2="184" class="whisker"/>
<line x1="639.29" y1="170" x2="639.29" y2="184" class="whisker"/>
<rect x="604.51" y="166" width="18.51" height="22" rx="4" fill="#56b4e9" fill-opacity="0.3" stroke="#56b4e9" stroke-width="2"/>
<line x1="613.22" y1="166" x2="613.22" y2="188" class="median"/>
<text x="52" y="234" class="label" text-anchor="start">Ghostty</text>
<text x="242" y="234" class="small" text-anchor="end">1.99 ms</text>
<line x1="748.87" y1="229" x2="978.5" y2="229" class="whisker"/>
<line x1="748.87" y1="222" x2="748.87" y2="236" class="whisker"/>
<line x1="978.5" y1="222" x2="978.5" y2="236" class="whisker"/>
<rect x="768.26" y="218" width="77.84" height="22" rx="4" fill="#e69f00" fill-opacity="0.3" stroke="#e69f00" stroke-width="2"/>
<line x1="788.08" y1="218" x2="788.08" y2="240" class="median"/>
<text x="52" y="286" class="label" text-anchor="start">kitty</text>
<text x="242" y="286" class="small" text-anchor="end">3.45 ms</text>
<line x1="879.87" y1="281" x2="898.44" y2="281" class="whisker"/>
<line x1="879.87" y1="274" x2="879.87" y2="288" class="whisker"/>
<line x1="898.44" y1="274" x2="898.44" y2="288" class="whisker"/>
<rect x="883.24" y="270" width="5.47" height="22" rx="4" fill="#34c38f" fill-opacity="0.3" stroke="#34c38f" stroke-width="2"/>
<line x1="884.84" y1="270" x2="884.84" y2="292" class="median"/>
<text x="52" y="338" class="label" text-anchor="start">Alacritty</text>
<text x="242" y="338" class="small" text-anchor="end">0.51 ms</text>
<line x1="492.77" y1="333" x2="658.54" y2="333" class="whisker"/>
<line x1="492.77" y1="326" x2="492.77" y2="340" class="whisker"/>
<line x1="658.54" y1="326" x2="658.54" y2="340" class="whisker"/>
<rect x="519.18" y="322" width="62.76" height="22" rx="4" fill="#e06c75" fill-opacity="0.3" stroke="#e06c75" stroke-width="2"/>
<line x1="548.93" y1="322" x2="548.93" y2="344" class="median"/>
<text x="42" y="422" class="small" text-anchor="start">Box: middle 50% · center line: median · whiskers: 5th–95th percentiles</text></svg>
