<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="440" viewBox="0 0 1200 440" role="img"><title>Terminal startup distribution</title>
<desc>Box plots comparing fresh launch-and-exit times for Monstar, foot, Alacritty, kitty, and Ghostty.</desc>
<style>
    .title { fill: #1f2328; font: 700 28px -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
    .subtitle { fill: #59636e; font: 15px -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
    .label { fill: #1f2328; font: 15px -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
    .small { fill: #59636e; font: 13px -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
    .axis { fill: #59636e; font: 12px -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
    .grid { stroke: #d0d7de; stroke-width: 1; }
    .whisker { stroke: #59636e; stroke-width: 1.4; }
    .median { stroke: #1f2328; stroke-width: 2.2; }
    .line { stroke: #d0d7de; stroke-width: 1; }
    </style>
<rect width="1200" height="440" rx="18" fill="#ffffff"/>
<rect x="1" y="1" width="1198" height="438" rx="17" fill="none" stroke="#d0d7de"/>
<rect x="28" y="84" width="1144" height="320" rx="12" fill="#f6f8fa"/>
<text x="42" y="48" class="title" text-anchor="start">Startup distribution</text>
<text x="42" y="72" class="subtitle" text-anchor="start">100 fresh launch-and-exit runs of true · logarithmic scale · lower is better</text>
<line x1="283.17" y1="100" x2="283.17" y2="365" class="grid"/>
<text x="283.17" y="391" class="axis" text-anchor="middle">10 ms</text>
<line x1="432.82" y1="100" x2="432.82" y2="365" class="grid"/>
<text x="432.82" y="391" class="axis" text-anchor="middle">20 ms</text>
<line x1="630.64" y1="100" x2="630.64" y2="365" class="grid"/>
<text x="630.64" y="391" class="axis" text-anchor="middle">50 ms</text>
<line x1="780.28" y1="100" x2="780.28" y2="365" class="grid"/>
<text x="780.28" y="391" class="axis" text-anchor="middle">100 ms</text>
<line x1="929.93" y1="100" x2="929.93" y2="365" class="grid"/>
<text x="929.93" y="391" class="axis" text-anchor="middle">200 ms</text>
<line x1="1079.57" y1="100" x2="1079.57" y2="365" class="grid"/>
<text x="1079.57" y="391" class="axis" text-anchor="middle">400 ms</text>
<text x="52" y="130" class="label" text-anchor="start">Monstar</text>
<text x="218" y="130" class="small" text-anchor="end">14.0 ms</text>
<line x1="276.02" y1="125" x2="441.44" y2="125" class="whisker"/>
<line x1="276.02" y1="118" x2="276.02" y2="132" class="whisker"/>
<line x1="441.44" y1="118" x2="441.44" y2="132" class="whisker"/>
<rect x="294.8" y="114" width="75.21" height="22" rx="4" fill="#d783ed" fill-opacity="0.3" stroke="#d783ed" stroke-width="2"/>
<line x1="355.26" y1="114" x2="355.26" y2="136" class="median"/>
<text x="52" y="182" class="label" text-anchor="start">foot</text>
<text x="218" y="182" class="small" text-anchor="end">18.7 ms</text>
<line x1="357.38" y1="177" x2="489.08" y2="177" class="whisker"/>
<line x1="357.38" y1="170" x2="357.38" y2="184" class="whisker"/>
<line x1="489.08" y1="170" x2="489.08" y2="184" class="whisker"/>
<rect x="369.69" y="166" width="61.52" height="22" rx="4" fill="#56b4e9" fill-opacity="0.3" stroke="#56b4e9" stroke-width="2"/>
<line x1="418.64" y1="166" x2="418.64" y2="188" class="median"/>
<text x="52" y="234" class="label" text-anchor="start">Alacritty</text>
<text x="218" y="234" class="small" text-anchor="end">66.7 ms</text>
<line x1="642.37" y1="229" x2="744.44" y2="229" class="whisker"/>
<line x1="642.37" y1="222" x2="642.37" y2="236" class="whisker"/>
<line x1="744.44" y1="222" x2="744.44" y2="236" class="whisker"/>
<rect x="680.24" y="218" width="29.65" height="22" rx="4" fill="#e06c75" fill-opacity="0.3" stroke="#e06c75" stroke-width="2"/>
<line x1="693.01" y1="218" x2="693.01" y2="240" class="median"/>
<path d="M754.2 225.8h0M759.4 227.4h0" fill="none" stroke="#e06c75" stroke-width="4.4" stroke-linecap="round" stroke-opacity="0.85"/>
