<text x="218" y="286" class="small" text-anchor="end">154.6 ms</text>
<line x1="832.15" y1="281" x2="984.05" y2="281" class="whisker"/>
<line x1="832.15" y1="274" x2="832.15" y2="288" class="whisker"/>
<line x1="984.05" y1="274" x2="984.05" y2="288" class="whisker"/>
<rect x="850.75" y="270" width="72.57" height="22" rx="4" fill="#34c38f" fill-opacity="0.3" stroke="#34c38f" stroke-width="2"/>
<line x1="874.41" y1="270" x2="874.41" y2="292" class="median"/>
<path d="M1001.3 277.8h0" fill="none" stroke="#34c38f" stroke-width="4.4" stroke-linecap="round" stroke-opacity="0.85"/>
