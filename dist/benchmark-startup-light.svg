<text x="218" y="338" class="small" text-anchor="end">250.0 ms</text>
<line x1="951.02" y1="333" x2="1012.3" y2="333" class="whisker"/>
<line x1="951.02" y1="326" x2="951.02" y2="340" class="whisker"/>
<line x1="1012.3" y1="326" x2="1012.3" y2="340" class="whisker"/>
<rect x="968.61" y="322" width="19.5" height="22" rx="4" fill="#e69f00" fill-opacity="0.3" stroke="#e69f00" stroke-width="2"/>
<line x1="978.13" y1="322" x2="978.13" y2="344" class="median"/>
<path d="M929.0 329.8h0M1019.8 331.4h0M1026.1 333.0h0M1031.7 334.6h0M1031.9 336.2h0M1044.7 329.8h0M1065.5 331.4h0M1075.9 333.0h0" fill="none" stroke="#e69f00" stroke-width="4.4" stroke-linecap="round" stroke-opacity="0.85"/>
<text x="42" y="422" class="small" text-anchor="start">Box: middle 50% · center line: median · whiskers: 1.5× IQR · dots: sampled outliers</text></svg>
