<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="440" viewBox="0 0 1200 440" role="img"><title>Terminal startup distribution</title>
<desc>Box plots comparing fresh launch-and-exit times for Monstar, foot, Alacritty, kitty, and Ghostty.</desc>
<style>
    .title { fill: #f0f6fc; font: 700 28px -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
    .subtitle { fill: #a8b3bf; font: 15px -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
    .label { fill: #f0f6fc; font: 15px -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
    .small { fill: #a8b3bf; font: 13px -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
    .axis { fill: #a8b3bf; font: 12px -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
    .grid { stroke: #3d444d; stroke-width: 1; }
    .whisker { stroke: #a8b3bf; stroke-width: 1.4; }
    .median { stroke: #f0f6fc; stroke-width: 2.2; }
    .line { stroke: #3d444d; stroke-width: 1; }
    </style>
<rect width="1200" height="440" rx="18" fill="#0d1117"/>
<rect x="1" y="1" width="1198" height="438" rx="17" fill="none" stroke="#3d444d"/>
<rect x="28" y="84" width="1144" height="320" rx="12" fill="#161b22"/>
<text x="42" y="48" class="title" text-anchor="start">Startup distribution</text>
<text x="42" y="72" class="subtitle" text-anchor="start">100 fresh launch-and-exit runs of true · logarithmic scale · lower is better</text>
<line x1="283.17" y1="100" x2="283.17" y2="365" class="grid"/>
<text x="283.17" y="391" class="axis" text-anchor="middle">10 ms</text>
<line x1="432.82" y1="100" x2="432.82" y2="365" class="grid"/>
<text x="432.82" y="391" class="axis" text-anchor="middle">20 ms</text>
<line x1="630.64" y1="100" x2="630.64" y2="365" class="grid"/>
<text x="630.64" y="391" class="axis" text-anchor="middle">50 ms</text>
<line x1="780.28" y1="100" x2="780.28" y2="365" class="grid"/>
<text x="780.28" y="391" class="axis" text-anchor="middle">100 ms</text>
<line x1="929.93" y1="100" x2="929.93" y2="365" class="grid"/>
<text x="929.93" y="391" class="axis" text-anchor="middle">200 ms</text>
<line x1="1079.57" y1="100" x2="1079.57" y2="365" class="grid"/>
<text x="1079.57" y="391" class="axis" text-anchor="middle">400 ms</text>
<text x="52" y="130" class="label" text-anchor="start">Monstar</text>
<text x="218" y="130" class="small" text-anchor="end">12.4 ms</text>
<line x1="262" y1="125" x2="378.91" y2="125" class="whisker"/>
<line x1="262" y1="118" x2="262" y2="132" class="whisker"/>
<line x1="378.91" y1="118" x2="378.91" y2="132" class="whisker"/>
<rect x="275.43" y="114" width="60.58" height="22" rx="4" fill="#d783ed" fill-opacity="0.3" stroke="#d783ed" stroke-width="2"/>
<line x1="329.05" y1="114" x2="329.05" y2="136" class="median"/>
<text x="52" y="182" class="label" text-anchor="start">foot</text>
<text x="218" y="182" class="small" text-anchor="end">18.1 ms</text>
<line x1="353.18" y1="177" x2="481.52" y2="177" class="whisker"/>
<line x1="353.18" y1="170" x2="353.18" y2="184" class="whisker"/>
<line x1="481.52" y1="170" x2="481.52" y2="184" class="whisker"/>
<rect x="368.82" y="166" width="61.96" height="22" rx="4" fill="#56b4e9" fill-opacity="0.3" stroke="#56b4e9" stroke-width="2"/>
<line x1="411.83" y1="166" x2="411.83" y2="188" class="median"/>
<path d="M507.8 173.8h0" fill="none" stroke="#56b4e9" stroke-width="4.4" stroke-linecap="round" stroke-opacity="0.85"/>
<text x="52" y="234" class="label" text-anchor="start">Alacritty</text>
<text x="218" y="234" class="small" text-anchor="end">56.3 ms</text>
<line x1="618.78" y1="229" x2="700.56" y2="229" class="whisker"/>
<line x1="618.78" y1="222" x2="618.78" y2="236" class="whisker"/>
<line x1="700.56" y1="222" x2="700.56" y2="236" class="whisker"/>
<rect x="632.63" y="218" width="49.95" height="22" rx="4" fill="#e06c75" fill-opacity="0.3" stroke="#e06c75" stroke-width="2"/>
<line x1="656.34" y1="218" x2="656.34" y2="240" class="median"/>
<text x="52" y="286" class="label" text-anchor="start">kitty</text>
<text x="218" y="286" class="small" text-anchor="end">132.2 ms</text>
<line x1="828.57" y1="281" x2="867.63" y2="281" class="whisker"/>
<line x1="828.57" y1="274" x2="828.57" y2="288" class="whisker"/>
<line x1="867.63" y1="274" x2="867.63" y2="288" class="whisker"/>
<rect x="836.56" y="270" width="17.62" height="22" rx="4" fill="#34c38f" fill-opacity="0.3" stroke="#34c38f" stroke-width="2"/>
<line x1="840.52" y1="270" x2="840.52" y2="292" class="median"/>
<text x="52" y="338" class="label" text-anchor="start">Ghostty</text>
<text x="218" y="338" class="small" text-anchor="end">208.7 ms</text>
<line x1="916.74" y1="333" x2="961.42" y2="333" class="whisker"/>
<line x1="916.74" y1="326" x2="916.74" y2="340" class="whisker"/>
<line x1="961.42" y1="326" x2="961.42" y2="340" class="whisker"/>
<rect x="933" y="322" width="12.76" height="22" rx="4" fill="#e69f00" fill-opacity="0.3" stroke="#e69f00" stroke-width="2"/>
<line x1="939.15" y1="322" x2="939.15" y2="344" class="median"/>
<text x="42" y="422" class="small" text-anchor="start">Box: middle 50% · center line: median · whiskers: 1.5× IQR · dots: sampled outliers</text></svg>
