<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="440" viewBox="0 0 1200 440" role="img"><title>Terminal startup distribution</title>
<desc>Box plots comparing fresh launch-and-exit times for Monstar, foot, Ghostty, kitty, and Alacritty.</desc>
<style>
    .title { fill: #f0f6fc; font: 700 28px -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
    .subtitle { fill: #a8b3bf; font: 15px -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
    .label { fill: #f0f6fc; font: 15px -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
    .small { fill: #a8b3bf; font: 13px -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
    .axis { fill: #a8b3bf; font: 12px -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
    .grid { stroke: #3d444d; stroke-width: 1; }
    .whisker { stroke: #a8b3bf; stroke-width: 1.4; }
    .median { stroke: #f0f6fc; stroke-width: 2.2; }
    .line { stroke: #3d444d; stroke-width: 1; }
    </style>
<rect width="1200" height="440" rx="18" fill="#0d1117"/>
<rect x="1" y="1" width="1198" height="438" rx="17" fill="none" stroke="#3d444d"/>
<rect x="28" y="84" width="1144" height="320" rx="12" fill="#161b22"/>
<text x="42" y="48" class="title" text-anchor="start">Startup distribution</text>
<text x="42" y="72" class="subtitle" text-anchor="start">100 fresh launch-and-exit runs of true · logarithmic scale · lower is better</text>
<line x1="283.17" y1="100" x2="283.17" y2="365" class="grid"/>
<text x="283.17" y="391" class="axis" text-anchor="middle">10 ms</text>
<line x1="432.82" y1="100" x2="432.82" y2="365" class="grid"/>
<text x="432.82" y="391" class="axis" text-anchor="middle">20 ms</text>
<line x1="630.64" y1="100" x2="630.64" y2="365" class="grid"/>
<text x="630.64" y="391" class="axis" text-anchor="middle">50 ms</text>
<line x1="780.28" y1="100" x2="780.28" y2="365" class="grid"/>
<text x="780.28" y="391" class="axis" text-anchor="middle">100 ms</text>
<line x1="929.93" y1="100" x2="929.93" y2="365" class="grid"/>
<text x="929.93" y="391" class="axis" text-anchor="middle">200 ms</text>
<line x1="1079.57" y1="100" x2="1079.57" y2="365" class="grid"/>
<text x="1079.57" y="391" class="axis" text-anchor="middle">400 ms</text>
<text x="52" y="130" class="label" text-anchor="start">Monstar</text>
<text x="218" y="130" class="small" text-anchor="end">12.3 ms</text>
<line x1="258.14" y1="125" x2="395.18" y2="125" class="whisker"/>
<line x1="258.14" y1="118" x2="258.14" y2="132" class="whisker"/>
<line x1="395.18" y1="118" x2="395.18" y2="132" class="whisker"/>
<rect x="278.51" y="114" width="56.23" height="22" rx="4" fill="#d783ed" fill-opacity="0.3" stroke="#d783ed" stroke-width="2"/>
<line x1="328.26" y1="114" x2="328.26" y2="136" class="median"/>
<text x="52" y="182" class="label" text-anchor="start">foot</text>
<text x="218" y="182" class="small" text-anchor="end">18.2 ms</text>
<line x1="353.4" y1="177" x2="495.02" y2="177" class="whisker"/>
<line x1="353.4" y1="170" x2="353.4" y2="184" class="whisker"/>
<line x1="495.02" y1="170" x2="495.02" y2="184" class="whisker"/>
<rect x="367.65" y="166" width="65.88" height="22" rx="4" fill="#56b4e9" fill-opacity="0.3" stroke="#56b4e9" stroke-width="2"/>
<line x1="411.96" y1="166" x2="411.96" y2="188" class="median"/>
<text x="52" y="234" class="label" text-anchor="start">Ghostty</text>
<text x="218" y="234" class="small" text-anchor="end">201.2 ms</text>
<line x1="884.72" y1="229" x2="975.39" y2="229" class="whisker"/>
<line x1="884.72" y1="222" x2="884.72" y2="236" class="whisker"/>
<line x1="975.39" y1="222" x2="975.39" y2="236" class="whisker"/>
<rect x="920.07" y="218" width="23.95" height="22" rx="4" fill="#e69f00" fill-opacity="0.3" stroke="#e69f00" stroke-width="2"/>
<line x1="931.18" y1="218" x2="931.18" y2="240" class="median"/>
<path d="M976.2 225.8h0M980.6 227.4h0M983.2 229.0h0M986.5 230.6h0" fill="none" stroke="#e69f00" stroke-width="4.4" stroke-linecap="round" stroke-opacity="0.85"/>
<text x="52" y="286" class="label" text-anchor="start">kitty</text>
<text x="218" y="286" class="small" text-anchor="end">131.9 ms</text>
<line x1="833.06" y1="281" x2="866.05" y2="281" class="whisker"/>
<line x1="833.06" y1="274" x2="833.06" y2="288" class="whisker"/>
<line x1="866.05" y1="274" x2="866.05" y2="288" class="whisker"/>
<rect x="837.55" y="270" width="15.82" height="22" rx="4" fill="#34c38f" fill-opacity="0.3" stroke="#34c38f" stroke-width="2"/>
<line x1="840.1" y1="270" x2="840.1" y2="292" class="median"/>
<path d="M885.7 277.8h0" fill="none" stroke="#34c38f" stroke-width="4.4" stroke-linecap="round" stroke-opacity="0.85"/>
<text x="52" y="338" class="label" text-anchor="start">Alacritty</text>
<text x="218" y="338" class="small" text-anchor="end">52.6 ms</text>
<line x1="617.63" y1="333" x2="703.97" y2="333" class="whisker"/>
<line x1="617.63" y1="326" x2="617.63" y2="340" class="whisker"/>
<line x1="703.97" y1="326" x2="703.97" y2="340" class="whisker"/>
<rect x="633.56" y="322" width="46.08" height="22" rx="4" fill="#e06c75" fill-opacity="0.3" stroke="#e06c75" stroke-width="2"/>
<line x1="641.62" y1="322" x2="641.62" y2="344" class="median"/>
<text x="42" y="422" class="small" text-anchor="start">Box: middle 50% · center line: median · whiskers: 1.5× IQR · dots: sampled outliers</text></svg>
